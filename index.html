<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGV Smart Warehouse HMI - ERa Integrated</title>
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <style>
        /* CSS Variables cho giao diện Sáng/Tối [cite: 864-905] */
        :root {
            --bg-main: #eef2f5; --bg-panel: #ffffff; --text-main: #2d3436;
            --accent: #0984e3; --success: #00b894; --warning: #fdcb6e; --danger: #ff7675;
            --header-bg: linear-gradient(135deg, #0984e3, #6c5ce7); --header-text: #ffffff;
            --box-wifi: #e3f2fd; --box-stat: #e8f8f5; --box-volt: #fff3e0; --box-amp: #fff9c4;
            --gauge-track: #f1f2f6; --shadow: rgba(0, 0, 0, 0.08);
        }
        [data-theme="dark"] {
            --bg-main: #181b21; --bg-panel: #22262e; --text-main: #f5f6fa;
            --header-bg: linear-gradient(135deg, #2d3436, #192a56); --header-text: #48dbfb;
            --box-wifi: rgba(9, 132, 227, 0.15); --box-stat: rgba(0, 184, 148, 0.15);
            --box-volt: rgba(230, 126, 34, 0.15); --box-amp: rgba(253, 203, 110, 0.15);
            --gauge-track: #2f3542;
        }

        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; padding: 12px; height: 100vh; overflow: hidden; background: var(--bg-main); color: var(--text-main); display: grid; grid-template-rows: 55px 1fr 180px; gap: 12px; }

        header { display: flex; justify-content: space-between; align-items: center; background: var(--header-bg); padding: 0 20px; border-radius: 8px; box-shadow: 0 4px 15px var(--shadow); }
        .sys-title { font-size: 20px; font-weight: 900; color: var(--header-text); }
        .status-badge { padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 12px; background: rgba(255,255,255,0.2); color: #fff; }
        .status-badge.running { background: var(--success); }
        .status-badge.error { background: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .workspace { display: grid; grid-template-columns: 280px 1fr; gap: 12px; min-height: 0; }
        .panel { background: var(--bg-panel); border-radius: 10px; padding: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 10px var(--shadow); }
        .panel-header { font-size: 13px; font-weight: 800; border-bottom: 2px solid var(--gauge-track); padding-bottom: 8px; margin-bottom: 16px; display: flex; justify-content: space-between; }

        .d-pad { display: grid; grid-template-columns: repeat(3, 65px); grid-gap: 10px; justify-content: center; }
        .btn-dir { width: 65px; height: 65px; border-radius: 12px; border: 2px solid var(--gauge-track); background: var(--bg-main); font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.15s; }
        .btn-dir.active { background: var(--accent); color: white; transform: translateY(4px); }

        .map-area { flex: 1; background: var(--bg-panel); border-radius: 8px; border: 2px solid var(--gauge-track); position: relative; overflow: hidden; }
        .auto-layout { display: grid; grid-template-columns: 1fr 240px; gap: 16px; height: 100%; }
        .btn-goline { background: linear-gradient(135deg, var(--accent), #00a8ff); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-goline.active { background: linear-gradient(135deg, #f39c12, #f1c40f); }

        .footer-workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .gauges-area { display: flex; justify-content: space-around; align-items: center; }
        .gauge-container { display: flex; flex-direction: column; align-items: center; width: 120px; position: relative; }
        .gauge { position: relative; width: 120px; height: 60px; overflow: hidden; }
        .gauge-bg { position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 10px solid var(--gauge-track); }
        .gauge-fill { position: absolute; width: 120px; height: 120px; border-radius: 50%; border: 10px solid transparent; border-bottom-color: var(--accent); border-left-color: var(--accent); transform: rotate(-45deg); transition: 0.4s; }
        .gauge-val { font-size: 24px; font-weight: 900; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 100%; }
        .info-box { border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 6px var(--shadow); }
        .info-box .i-label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .info-box .i-val { font-size: 18px; font-weight: 900; font-family: monospace; }
        
        .elegant-toggle { background: var(--bg-main); border-radius: 20px; padding: 4px; display: flex; }
        .elegant-toggle button { background: transparent; border: none; padding: 5px 12px; font-size: 11px; font-weight: 800; border-radius: 16px; cursor: pointer; }
        .elegant-toggle button.active { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <header>
        <div class="sys-title">AGV <span>PRO-DASH</span></div>
        <div class="sys-status-bar">
            <div id="sysStatus" class="status-badge stopped">STOPPED</div>
            <button id="btnEStop" style="background:var(--danger); color:white; border:none; padding:6px 15px; border-radius:5px; font-weight:900; cursor:pointer;">E-STOP</button>
        </div>
        <div style="display: flex; gap: 15px; align-items: center; color:white;">
            <button id="btnTheme" style="background:none; border:none; cursor:pointer; font-size:18px;">🌓</button>
            <div id="clockTime" style="font-weight:800; font-size:16px;">00:00:00</div>
        </div>
    </header>

    <div class="workspace">
        <div class="panel">
            <div class="panel-header">🕹️ MANUAL CONTROL
                <div class="elegant-toggle">
                    <button id="btnCtrlWeb" class="active">WEB</button>
                    <button id="btnCtrlRC">RC</button>
                </div>
            </div>
            <div class="d-pad" id="interZone">
                <div style="visibility:hidden"></div><button id="btnUp" class="btn-dir">W</button><div></div>
                <button id="btnLeft" class="btn-dir">A</button><button id="btnDown" class="btn-dir">S</button><button id="btnRight" class="btn-dir">D</button>
            </div>
            <p style="font-size:10px; text-align:center; color:gray; margin-top:20px;">Dùng W A S D để lái khi bật chế độ WEB.</p>
        </div>

        <div class="panel">
            <div class="panel-header">🗺️ VIRTUAL MAP & ROUTING</div>
            <div class="auto-layout">
                <div class="map-area">
                    <svg id="svgMap" width="100%" height="100%"></svg>
                    <div id="agvIcon" style="position:absolute; width:20px; height:20px; background:var(--accent); border-radius:50%; border:2px solid white; transition:1s; opacity:0;"></div>
                </div>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <button id="btnGoLine" class="btn-goline">▶ BẮT ĐẦU GO LINE</button>
                    <input type="text" id="uidInput" placeholder="Nhập/Quét UID" style="padding:10px; border-radius:5px; border:1px solid #ccc; text-align:center;">
                    <button id="btnAddPoint" style="background:var(--success); color:white; border:none; padding:8px; border-radius:5px; font-weight:800;">+ THÊM ĐIỂM</button>
                    <div id="pointList" style="flex:1; overflow-y:auto; border-top:1px solid #eee; padding-top:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-workspace">
        <div class="panel">
            <div class="panel-header">⚡ PWM REALTIME FEEDBACK</div>
            <div class="gauges-area">
                <div class="gauge-container"><span>LEFT</span><div class="gauge"><div class="gauge-bg"></div><div id="gaugeL" class="gauge-fill"></div></div><div class="gauge-val" id="valL">0</div></div>
                <div class="gauge-container"><span>RIGHT</span><div class="gauge"><div class="gauge-bg"></div><div id="gaugeR" class="gauge-fill"></div></div><div class="gauge-val" id="valR">0</div></div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">📊 TELEMETRY</div>
            <div class="info-grid">
                <div class="info-box box-wifi"><span class="i-label">Wi-Fi</span><span class="i-val" id="valWifi">-- %</span></div>
                <div class="info-box box-stat"><span class="i-label">Status</span><span class="i-val" id="valState">OK</span></div>
                <div class="info-box box-volt"><span class="i-label">Battery</span><span class="i-val" id="valVolt">-- V</span></div>
                <div class="info-box box-amp"><span class="i-label">Current</span><span class="i-val" id="valAmp">-- A</span></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
